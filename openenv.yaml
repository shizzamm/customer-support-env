name: customer-support-env
version: 1.0.0
description: "Real-world customer support simulation for order tracking, refunds, and escalations."

entrypoint: server.app:app 

tasks:
  - id: "order_status_check"
    difficulty: "easy"
    description: "Customer asking for the status of their order."
  - id: "refund_request_damaged"
    difficulty: "medium"
    description: "Customer reporting a damaged item requiring a refund."
  - id: "legal_escalation"
    difficulty: "hard"
    description: "Angry customer threatening legal action requiring manager escalation."

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state

metadata:
  runtime: "python"
  repo: "https://huggingface.co/spaces/Sharag2008-dev/customer-support-env"